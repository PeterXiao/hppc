[versions]
antlr = "4.13.2"
assertj = "3.27.7"
carrotsearch-console = "1.4.3"
commons-codec = "1.17.0"
fastutil = "8.5.18"
# @keep This is GJF version for spotless/ tidy.
googleJavaFormat = "1.35.0"
# @keep spotless formatting of groovy/gradle files
greclipse = "4.26"
# @keep This is the project's version.
hppcVersion = "0.11.0-SNAPSHOT"
jgit = "7.6.0.202603022253-r"
jmh = "1.37"
junit = "6.0.3"
koloboke = "1.0.0"
# @keep This is the minimum required Java version.
minJava = "17"
randomizedtesting = "2.8.4"
velocity = "2.3"

[libraries]
antlr-base = { module = "org.antlr:antlr4", version.ref = "antlr" }
antlr-runtime = { module = "org.antlr:antlr4-runtime", version.ref = "antlr" }
assertj = { module = "org.assertj:assertj-core", version.ref = "assertj" }
carrotsearch-console-launcher = { module = "com.carrotsearch.console:launcher", version.ref = "carrotsearch-console" }
# @keep This is used in gitinfo.gradle
commons-codec = { module = "commons-codec:commons-codec", version.ref = "commons-codec" }
fastutil = { module = "it.unimi.dsi:fastutil", version.ref = "fastutil" }
# @keep This is used in gitinfo.gradle
jgit = { module = "org.eclipse.jgit:org.eclipse.jgit", version.ref = "jgit" }
jmh-core = { module = "org.openjdk.jmh:jmh-core", version.ref = "jmh" }
jmh-generator-annprocess = { module = "org.openjdk.jmh:jmh-generator-annprocess", version.ref = "jmh" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit" }
junit-vintage-engine = { module = "org.junit.vintage:junit-vintage-engine", version.ref = "junit" }
koloboke = { module = "com.koloboke:koloboke-impl-jdk8", version.ref = "koloboke" }
randomizedtesting-runner = { module = "com.carrotsearch.randomizedtesting:randomizedtesting-runner", version.ref = "randomizedtesting" }
velocity = { module = "org.apache.velocity:velocity-engine-core", version.ref = "velocity" }

[plugins]
benmanes-versions = "com.github.ben-manes.versions:0.53.0"
dependencychecks = "com.carrotsearch.gradle.dependencychecks:0.2.1"
forbiddenapis = "de.thetaphi.forbiddenapis:3.10"
jmh = "me.champeau.jmh:0.7.3"
randomizedtesting = "com.carrotsearch.gradle.randomizedtesting:0.0.6"
spotless = "com.diffplug.spotless:8.3.0"
versionCatalogUpdate = "nl.littlerobots.version-catalog-update:1.1.0"
